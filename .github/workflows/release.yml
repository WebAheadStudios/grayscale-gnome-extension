name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Perform a dry run'
        required: false
        default: false
        type: boolean

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run quality validation
        run: npm run validate:full

      - name: Dry run semantic release
        if: github.event.inputs.dry_run == 'true'
        run: npm run release:dry
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release
        if: github.event.inputs.dry_run != 'true'
        run: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post-release validation
        if: github.event.inputs.dry_run != 'true'
        run: |
          if [ -f "dist/grayscale-toggle@webaheadstudios.com.zip" ]; then
            echo "✅ Extension package created successfully"
            unzip -t "dist/grayscale-toggle@webaheadstudios.com.zip"
            echo "✅ Extension package is valid"
          else
            echo "❌ Extension package not found"
            exit 1
          fi

  notify:
    name: Notify Success
    runs-on: ubuntu-latest
    needs: release
    if: success() && github.event.inputs.dry_run != 'true'
    steps:
      - name: Get release info
        id: release
        run: |
          # Get the latest release info
          LATEST_RELEASE=$(curl -s \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/releases/latest)

          RELEASE_TAG=$(echo "$LATEST_RELEASE" | jq -r '.tag_name // "unknown"')
          RELEASE_URL=$(echo "$LATEST_RELEASE" | jq -r '.html_url // "unknown"')

          echo "tag=$RELEASE_TAG" >> $GITHUB_OUTPUT
          echo "url=$RELEASE_URL" >> $GITHUB_OUTPUT

      - name: Create success summary
        run: |
          echo "## 🚀 Release Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Release Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: ${{ steps.release.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Release URL**: [${{ steps.release.outputs.tag }}](${{ steps.release.outputs.url }})" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository**: ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### What's Next?" >> $GITHUB_STEP_SUMMARY
          echo "- 📦 Extension package is ready for distribution" >> $GITHUB_STEP_SUMMARY
          echo "- 📝 Changelog has been updated" >> $GITHUB_STEP_SUMMARY
          echo "- 🔗 GitHub release includes installation assets" >> $GITHUB_STEP_SUMMARY
          echo "- 🌐 Consider submitting to GNOME Extensions website" >> $GITHUB_STEP_SUMMARY

  failure-notification:
    name: Handle Release Failure
    runs-on: ubuntu-latest
    needs: release
    if: failure()
    steps:
      - name: Create failure summary
        run: |
          echo "## ❌ Release Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The release process encountered an error. Please check the logs above for details." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Common Issues" >> $GITHUB_STEP_SUMMARY
          echo "- Ensure all commits follow conventional commit format" >> $GITHUB_STEP_SUMMARY
          echo "- Check that all quality gates are passing" >> $GITHUB_STEP_SUMMARY
          echo "- Verify GITHUB_TOKEN permissions are sufficient" >> $GITHUB_STEP_SUMMARY
          echo "- Make sure the last commit includes releasable changes" >> $GITHUB_STEP_SUMMARY
