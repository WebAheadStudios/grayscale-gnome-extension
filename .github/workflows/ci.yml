name: CI

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    ci:
        name: CI
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v6
              with:
                  node-version-file: .node-version
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: TypeScript compilation check
              run: npm run compile

            - name: Lint
              run: npm run lint:strict

            - name: Prettier check
              run: npm run format:check

            - name: Run tests
              run: npm run test:ci

            - name: Build extension
              run: npm run build:prod

            - name: Validate metadata.json
              run: |
                  if [ ! -f "src/metadata.json" ]; then
                    echo "Error: metadata.json not found"; exit 1
                  fi
                  python3 -m json.tool src/metadata.json > /dev/null || { echo "Error: Invalid JSON in metadata.json"; exit 1; }
                  grep -q '"uuid"' src/metadata.json || { echo "Error: uuid missing from metadata.json"; exit 1; }
                  grep -q '"shell-version"' src/metadata.json || { echo "Error: shell-version missing from metadata.json"; exit 1; }
                  echo "✅ metadata.json valid"

            - name: Validate GSchema XML
              run: |
                  xmllint --noout schemas/*.gschema.xml
                  echo "✅ GSchema XML valid"

            - name: Upload extension package
              uses: actions/upload-artifact@v4
              with:
                  name: extension-package
                  path: dist/grayscale-toggle@webaheadstudios.com.zip
                  retention-days: 30
