name: Bug Report
description: Report a bug or issue with the extension
title: "bug: "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the information below to help us diagnose and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: A clear and concise description of what actually happened.
      placeholder: What actually happened?
    validations:
      required: true

  - type: dropdown
    id: gnome-version
    attributes:
      label: GNOME Shell Version
      description: What version of GNOME Shell are you running?
      options:
        - "46.x"
        - "45.x"
        - "44.x"
        - "Other (specify in additional context)"
    validations:
      required: true

  - type: dropdown
    id: extension-version
    attributes:
      label: Extension Version
      description: What version of the extension are you using?
      options:
        - "Latest (main branch)"
        - "1.0.0"
        - "Other (specify in additional context)"
    validations:
      required: true

  - type: dropdown
    id: operating-system
    attributes:
      label: Operating System
      description: What operating system are you using?
      options:
        - "Ubuntu 22.04"
        - "Ubuntu 23.04"
        - "Ubuntu 24.04"
        - "Fedora"
        - "Arch Linux"
        - "Other Linux"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: |
        Please provide relevant logs. You can get GNOME Shell logs with:
        `journalctl -f -o cat /usr/bin/gnome-shell`
      placeholder: Paste logs here...
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots or videos to help explain the problem.

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      description: Please confirm the following
      options:
        - label: I have searched for existing issues that describe this bug
          required: true
        - label: I have tried restarting GNOME Shell
          required: false
        - label: I have tried disabling other extensions to isolate the issue
          required: false
